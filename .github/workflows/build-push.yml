name: build-push or CI

on:
  workflow-dispatch:

jobs:

  build-push:
    runs-on: ubuntu-latest

    steps:
      
      name: checkout code
      uses: actions/checkout@v4

      name: Login to Docker 
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

      name: Build and push
      uses: docker/build-push-action@v5GITHUB_SHA
      with:
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ GITHUB_SHA }}




