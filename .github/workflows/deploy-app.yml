name: deploy-app

on:
  workflow_dispatch:

jobs:

  deploy-app:

    env: 
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

    runs-on: self-hosted

    steps:

      - name: checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        run: docker compose up -d --build   